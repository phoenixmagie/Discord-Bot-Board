<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Config Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="protectPage()">
    <nav class="navbar">
        <div class="nav-content">
            <span class="brand">CONFIG BOT</span>
            <button class="btn-logout" onclick="logout()">Abmelden</button>
        </div>
    </nav>

    <div id="dashboard" class="dashboard-container">
        <header class="hero">
            <h1>Power up your Server</h1>
            <p>Konfiguriere deinen Bot effizient über dieses Dashboard.</p>
            <a id="oauthLink" href="#" class="btn btn-hero">Bot jetzt einladen</a>
        </header>

        <section class="features" id="featureGrid"></section>
        
        <div class="key-display">
            <small>SYSTEM STATUS</small>
            <p style="color: #43b581; font-weight: bold; margin-top: 10px;">
                ● Verbunden mit VIP-System
            </p>
            <p style="font-size: 0.8rem; color: var(--text-muted);">
                Sicherheitsmodus aktiv: Client Secrets sind verborgen.
            </p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="logic.js"></script>
</body>
</html>
