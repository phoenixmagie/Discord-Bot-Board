<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Config Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="protectPage()">
    <nav class="navbar">
        <div class="nav-content">
            <span class="brand">CONFIG BOT</span>
            <button class="btn-logout" onclick="logout()">Abmelden</button>
        </div>
    </nav>

    <div id="dashboard" class="dashboard-container">
        <header class="hero">
            <h1>Willkommen im Admin-Panel</h1>
            <p>Verwalte deine <code>CLAN_DATA</code> Umgebung zentral.</p>
            <a id="oauthLink" href="#" class="btn btn-hero">Bot hinzufügen</a>
        </header>

        <section class="features" id="featureGrid"></section>

        <section class="commands-section">
            <h2 style="margin-bottom: 20px; border-bottom: 1px solid #4f545c; padding-bottom: 10px;">Befehlsübersicht</h2>
            <div id="commandList" class="command-container">
                </div>
        </section>
        
        <div class="key-display">
            <small>SYSTEM STATUS</small>
            <p style="color: #43b581; font-weight: bold; margin-top: 10px;">VIP-System Online</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="logic.js"></script>
</body>
</html>
