<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Slot Activity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>NEON SLOTS</h1>
        <div class="stats">
            Tokens: <span id="token-count" class="token-count">0</span>
        </div>
        <div class="slot-machine">
            <div id="reel1" class="reel">7️⃣</div>
            <div id="reel2" class="reel">💎</div>
            <div id="reel3" class="reel">🔥</div>
        </div>
        <button id="spin-button" onclick="spin()">SPIN (1 Token)</button>
        <div id="message" class="message">Viel Glück!</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
