<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werwölfe von Düsterwald - Open World</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body class="phase-day">
    <div id="landscape-warning">Bitte drehe dein Gerät ins Querformat!</div>
    
    <div id="ui-layer">
        <div id="top-bar">
            <div id="timer-display">Warten auf Spielstart...</div>
            <div id="role-display">Rolle: Unbekannt</div>
        </div>
        <div id="action-btn" class="hidden">NACHT-AKTION</div>
    </div>

    <div id="viewport">
        <div id="world">
            <div id="village-square"></div>
            <div id="entities"></div>
        </div>
    </div>

    <div id="joystick-zone"></div>

    <script src="script.js"></script>
</body>
</html>
