<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Bot Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="container login-card">
        <div class="bot-logo">C</div>
        <h2>Willkommen zurück!</h2>
        <p class="info-text">Bitte autorisiere dich für den Zugriff.</p>
        <div class="input-group">
            <label>ADMIN PASSWORT</label>
            <input type="password" id="passInput" autofocus>
        </div>
        <button class="btn full-width" onclick="checkPass()">Anmelden</button>
        <p id="error" class="error-msg">Passwort inkorrekt.</p>
    </div>
    <script src="config.js"></script>
    <script src="logic.js"></script>
</body>
</html>
