<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Activity</title>
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <style>
        body {
            background-color: #23272a;
            color: #ffffff;
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2b2d31;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #5865f2;
        }
        h1 { color: #5865f2; margin-bottom: 0.5rem; }
        #status-text { color: #b5bac1; font-size: 0.9rem; }
        .loader { color: #fee75c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Phoenix System</h1>
        <p id="status-text">Initialisiere Verbindung...</p>
    </div>

    <script type="module">
        // Importiere das SDK als Modul
        import { DiscordSDK } from "https://unpkg.com/@discord/embedded-app-sdk/dist/index.js";

        let discordSdk;

        async function startPhoenixActivity() {
            const statusEl = document.getElementById('status-text');

            try {
                // 1. Lade die Konfiguration
                const configResponse = await fetch('./config.json');
                if (!configResponse.ok) throw new Error("config.json konnte nicht geladen werden.");
                const config = await configResponse.json();

                // 2. SDK Initialisierung
                discordSdk = new DiscordSDK(config.clientId);
                await discordSdk.ready();
                statusEl.innerText = "Authentifizierung gestartet...";

                // 3. OAuth2 Authorize (öffnet das Discord-Fenster für activities.write)
                // Hinweis: redirect_uri muss im Developer Portal hinterlegt sein!
                const { code } = await discordSdk.commands.authorize({
                    client_id: config.clientId,
                    response_type: 'code',
                    state: '',
                    prompt: 'none',
                    scope: ['activities.write'],
                });

                if (!code) throw new Error("Authentifizierung fehlgeschlagen.");

                // 4. Presence setzen (Das "Playing"-Gefühl)
                // Berechnung für die 10.000 Stunden Anzeige
                const tenThousandHoursInSeconds = 10000 * 60 * 60;
                const startTime = Math.floor(Date.now() / 1000) - tenThousandHoursInSeconds;

                await discordSdk.commands.setActivity({
                    activity: {
                        state: config.activity.state,
                        details: config.activity.details,
                        timestamps: {
                            start: startTime
                        },
                        assets: {
                            large_image: config.activity.largeImageKey,
                            large_text: config.activity.largeImageText,
                            small_image: config.activity.smallImageKey,
                            small_text: config.activity.smallImageText
                        },
                        party: {
                            id: config.activity.partyId,
                            size: config.activity.partySize
                        },
                        secrets: {
                            join: config.activity.joinSecret
                        },
                        instance: true
                    }
                });

                statusEl.innerHTML = '<span style="color: #57f287;">Aktiv! Phoenix wird im Profil angezeigt.</span>';

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = '<span style="color: #ed4245;">Fehler: ' + error.message + '</span>';
            }
        }

        // Startet den Prozess
        startPhoenixActivity();
    </script>
</body>
</html>
