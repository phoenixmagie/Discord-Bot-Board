<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Activity</title>
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <style>
        body {
            background-color: #23272a;
            color: #ffffff;
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background-color: #2b2d31;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #5865f2;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #5865f2;
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
            color: #fee75c;
            font-weight: bold;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #5865f2;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Phoenix System</h1>
        <div id="loader-icon" class="loader"></div>
        <p id="status">Verbinde mit Discord Schnittstelle...</p>
    </div>

    <script type="module">
        // Das SDK wird über das globale Objekt window.discordSdk geladen
        const { DiscordSDK } = window.discordSdk;

        // DEINE KONFIGURATION
        const CONFIG = {
            clientId: "1461675860598718477",
            activity: {
                state: "Playing Phoenix",
                details: "YAFRnaYP5seBJ9I5BQ4ATQQ9szcK38fo",
                largeImageKey: "1498222409709391902", // Muss im Dev-Portal hochgeladen sein
                largeImageText: "Numbani"
            },
            redirectUri: "https://phoenix-pnx.vercel.app/games/test.html"
        };

        async function startPhoenix() {
            const statusEl = document.getElementById('status');
            const loaderEl = document.getElementById('loader-icon');

            try {
                // 1. SDK Initialisierung
                const sdk = new DiscordSDK(CONFIG.clientId);
                await sdk.ready();
                
                statusEl.innerText = "Autorisierung wird angefordert...";

                // 2. OAuth2 Autorisierung mit all deinen Scopes
                const { code } = await sdk.commands.authorize({
                    client_id: CONFIG.clientId,
                    response_type: 'code',
                    state: '',
                    prompt: 'none',
                    scope: [
                        'identify',
                        'identify.premium',
                        'rpc',
                        'applications.commands',
                        'activities.write',
                        'activities.read',
                        'activities.invites.write',
                        'openid'
                    ],
                    redirect_uri: CONFIG.redirectUri
                });

                if (!code) {
                    throw new Error("Autorisierung fehlgeschlagen oder abgebrochen.");
                }

                // 3. Zeitstempel für 10.000 Stunden berechnen
                // (10000 Stunden * 60 Minuten * 60 Sekunden)
                const tenThousandHoursInSeconds = 10000 * 3600;
                const startTime = Math.floor(Date.now() / 1000) - tenThousandHoursInSeconds;

                // 4. Den Rich Presence Status setzen
                await sdk.commands.setActivity({
                    activity: {
                        state: CONFIG.activity.state,
                        details: CONFIG.activity.details,
                        timestamps: {
                            start: startTime
                        },
                        assets: {
                            large_image: CONFIG.activity.largeImageKey,
                            large_text: CONFIG.activity.largeImageText
                        },
                        instance: true
                    }
                });

                // Erfolgmeldung
                loaderEl.style.display = "none";
                statusEl.innerText = "Phoenix Status ist jetzt AKTIV!";
                statusEl.style.color = "#57f287";

            } catch (err) {
                console.error("Phoenix System Fehler:", err);
                loaderEl.style.display = "none";
                statusEl.innerText = "Fehler: " + err.message;
                statusEl.style.color = "#ed4245";
            }
        }

        // Start der Anwendung
        startPhoenix();
    </script>
</body>
</html>
