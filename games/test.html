<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Activity</title>
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <style>
        body {
            background-color: #23272a;
            color: #ffffff;
            font-family: 'gg sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2b2d31;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #5865f2;
            text-align: center;
            min-width: 300px;
        }
        #status-text { color: #fee75c; margin-top: 10px; }
        .success { color: #57f287 !important; }
        .error { color: #ed4245 !important; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="color: #5865f2;">Phoenix System</h1>
        <p id="status-text">Starte Phoenix-Modul...</p>
    </div>

    <script type="module">
        // Wir nutzen das globale discordSdk Objekt direkt von der unpkg Quelle
        const { DiscordSDK } = window.discordSdk;

        // DEINE DATEN DIREKT HIER (Keine config.json mehr nötig)
        const CONFIG = {
            clientId: "1461675860598718477",
            activity: {
                state: "Playing Phoenix",
                details: "YAFRnaYP5seBJ9I5BQ4ATQQ9szcK38fo",
                largeImageKey: "1498222409709391902",
                largeImageText: "Numbani",
                smallImageKey: "potion",
                smallImageText: "...",
                partyId: "ae488379-351d-4a4f-ad32-2b9b01c91657",
                partySize: [1, 15],
                joinSecret: "MTI4NzM0OjFpMmhuZToxMjMxMjM="
            }
        };

        const statusEl = document.getElementById('status-text');

        async function initPhoenix() {
            try {
                // 1. SDK Initialisieren
                const sdk = new DiscordSDK(CONFIG.clientId);
                statusEl.innerText = "Verbindung zu Discord wird aufgebaut...";
                
                await sdk.ready();
                statusEl.innerText = "Warte auf Autorisierung...";

                // 2. OAuth2 Authorize
                const { code } = await sdk.commands.authorize({
                    client_id: CONFIG.clientId,
                    response_type: 'code',
                    state: '',
                    prompt: 'none',
                    scope: ['activities.write'],
                    redirect_uri: 'https://phoenix-pnx.vercel.app/games/test.html'
                });

                if (!code) throw new Error("Autorisierung vom Nutzer abgelehnt.");

                // 3. Zeit für 10.000 Stunden berechnen
                const startTime = Math.floor(Date.now() / 1000) - (10000 * 60 * 60);

                // 4. Status im Profil setzen
                await sdk.commands.setActivity({
                    activity: {
                        state: CONFIG.activity.state,
                        details: CONFIG.activity.details,
                        timestamps: { start: startTime },
                        assets: {
                            large_image: CONFIG.activity.largeImageKey,
                            large_text: CONFIG.activity.largeImageText,
                            small_image: CONFIG.activity.smallImageKey,
                            small_text: CONFIG.activity.smallImageText
                        },
                        party: {
                            id: CONFIG.activity.partyId,
                            size: CONFIG.activity.partySize
                        },
                        secrets: {
                            join: CONFIG.activity.joinSecret
                        },
                        instance: true
                    }
                });

                statusEl.innerText = "Status aktiv! Phoenix läuft.";
                statusEl.classList.add('success');

            } catch (err) {
                console.error("Phoenix Error:", err);
                statusEl.innerText = "Fehler: " + err.message;
                statusEl.classList.add('error');
            }
        }

        // Starte die App
        initPhoenix();
    </script>
</body>
</html>
