<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Phoenix Discord Activity</title>
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <style>
        body { background: #23272a; color: white; font-family: 'Helvetica', sans-serif; text-align: center; padding-top: 50px; }
        .status-box { border: 1px solid #5865f2; display: inline-block; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="status-box">
        <h2>Phoenix Activity Loader</h2>
        <p id="msg">Initialisiere...</p>
    </div>

    <script type="module">
        import { DiscordSDK } from "https://unpkg.com/@discord/embedded-app-sdk/dist/index.js";

        async function initActivity() {
            const statusEl = document.getElementById('msg');

            try {
                // 1. config.json laden
                const configReq = await fetch('./config.json');
                const config = await configReq.json();
                
                // 2. SDK Setup
                const discordSdk = new DiscordSDK(config.clientId);
                await discordSdk.ready();
                
                // 3. Berechnung für 10.000 Stunden (in Sekunden)
                const tenThousandHoursInSec = 10000 * 60 * 60;
                const startTime = Math.floor(Date.now() / 1000) - tenThousandHoursInSec;

                // 4. Presence setzen (entspricht deinem UpdatePresence)
                await discordSdk.commands.setActivity({
                    activity: {
                        state: config.activity.state,
                        details: config.activity.details,
                        timestamps: {
                            start: startTime
                        },
                        assets: {
                            large_image: config.activity.largeImageKey,
                            large_text: config.activity.largeImageText,
                            small_image: config.activity.smallImageKey,
                            small_text: config.activity.smallImageText
                        },
                        party: {
                            id: config.activity.partyId,
                            size: config.activity.partySize
                        },
                        secrets: {
                            join: config.activity.joinSecret
                        }
                    }
                });

                statusEl.innerText = "Status erfolgreich gesetzt: " + config.activity.state;

            } catch (err) {
                console.error(err);
                statusEl.innerText = "Fehler: " + err.message;
            }
        }

        initActivity();
    </script>
</body>
</html>
