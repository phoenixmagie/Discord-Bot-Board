<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Test Activity</title>
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <style>
        body {
            background-color: #23272a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .status-card {
            background-color: #2b2d31;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #5865f2;
            text-align: center;
        }
        .active-status { color: #57f287; font-weight: bold; }
    </style>
</head>
<body>

    <div class="status-card">
        <h1>Phoenix System</h1>
        <p id="msg">Verbinde mit Discord SDK...</p>
    </div>

    <script type="module">
        import { DiscordSDK } from "https://unpkg.com/@discord/embedded-app-sdk/dist/index.js";

        async function startActivity() {
            const msgEl = document.getElementById('msg');

            try {
                // 1. Config laden
                const response = await fetch('./config.json');
                const config = await response.json();

                // 2. SDK Setup
                const discordSdk = new DiscordSDK(config.clientId);
                await discordSdk.ready();

                // 3. OAuth2 Authorize mit deiner spezifischen Redirect URI
                const { code } = await discordSdk.commands.authorize({
                    client_id: config.clientId,
                    response_type: 'code',
                    state: '',
                    prompt: 'none',
                    scope: ['activities.write'],
                    // Die von dir angegebene Redirect URI
                    redirect_uri: 'https://phoenix-pnx.vercel.app/games/test.html'
                });

                if (!code) {
                    throw new Error("Kein Auth-Code erhalten.");
                }

                // 4. Zeitberechnung für 10.000 Stunden
                const tenThousandHoursInSec = 10000 * 60 * 60;
                const startTime = Math.floor(Date.now() / 1000) - tenThousandHoursInSec;

                // 5. Presence setzen
                await discordSdk.commands.setActivity({
                    activity: {
                        state: config.activity.state,
                        details: config.activity.details,
                        timestamps: { start: startTime },
                        assets: {
                            large_image: config.activity.largeImageKey,
                            large_text: config.activity.largeImageText,
                            small_image: config.activity.smallImageKey,
                            small_text: config.activity.smallImageText
                        },
                        party: {
                            id: config.activity.partyId,
                            size: config.activity.partySize
                        },
                        secrets: {
                            join: config.activity.joinSecret
                        },
                        instance: true
                    }
                });

                msgEl.innerHTML = '<span class="active-status">Phoenix Status aktiv!</span><br>Schau in dein Discord Profil.';

            } catch (err) {
                console.error(err);
                msgEl.innerHTML = '<span style="color: #ed4245;">Fehler: ' + err.message + '</span>';
            }
        }

        startActivity();
    </script>
</body>
</html>
